version: '3.8'

services:
  gateway:
    image: nginx:alpine
    ports:
      - "8080:80"  # <--- Cambiamos "80" por "8080:80"
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - usuarios
      - productos
      - pagos
    restart: always

  usuarios:
    build: ./usuarios
    ports:
      - "3001:3001"
    restart: always

  productos:
    build: ./productos
    ports:
      - "3002:3002"
    restart: always

  pagos:
    build: ./pagos
    ports:
      - "3003:3003"
    restart: always
